services:
  orchestrator:
    build: .
    ports:
      - "8000:8000"
    environment:
      - LOG_DIR=/app/logs
      - LOG_FILE=/app/logs/orchestrator.log
      - LOG_LEVEL=INFO
      - BARONLLM_MODEL_PATH=/app/models/baronllm-llama3.1-v1-q6_k.gguf
      - DATABASE_URL=sqlite:////app/data/alphaweb.db
      - HOST_DATA_DIR=volume:john_data
      - JOHN_LOCAL_DATA_DIR=/app/data
      - CONTAINER_DATA_DIR=/data
      - JOHN_WORDLIST_MOUNT_MODE=host_path
      - TOOL_EXECUTION_TIMEOUT_SECS=900
      - TOOL_OUTPUT_MAX_CHARS=200000
      - DEFAULT_TOOL_TIMEOUT=300
      - MAX_CONCURRENT_SCANS=5
      - SCANS_PER_HOUR_LIMIT=10
      - MAX_QUEUE_DEPTH=50
      - WORKFLOW_MAX_DEPTH=4
      - WORKFLOW_MAX_TOOLS=6
      - ORCHESTRATION_CONFIDENCE_THRESHOLD=0.75
      - DOCKER_MEMORY_LIMIT=512m
      - DOCKER_CPU_LIMIT=1.0
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models:ro
      - john_data:/app/data:rw
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  john_data:
